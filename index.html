        // ====== BACKGROUND TIMER (survives lock screen) ======
        class BackgroundTimer {
            constructor() {
                this.startTime = null;
                this.duration = 0;
                this.remaining = 0;
                this.active = false;
                this.intervalId = null;
                this.onTick = null;
                this.onDone = null;
            }

            start(seconds, onTick, onDone) {
                this.duration = seconds;
                this.remaining = seconds;
                this.active = true;
                this.onTick = onTick;
                this.onDone = onDone;
                this.startTime = Date.now();

                // Save to localStorage for persistence across background
                localStorage.setItem('wt_timer_active', 'true');
                localStorage.setItem('wt_timer_end', String(Date.now() + seconds * 1000));
                localStorage.setItem('wt_timer_duration', String(seconds));

                this._tick();
                this.intervalId = setInterval(() => this._tick(), 1000);

                // Listen for visibility changes
                this._visibilityHandler = () => {
                    if (!document.hidden) {
                        this._syncFromStorage();
                    }
                };
                document.addEventListener('visibilitychange', this._visibilityHandler);
            }

            _tick() {
                if (!this.active) return;

                const now = Date.now();
                const elapsed = Math.floor((now - this.startTime) / 1000);
                this.remaining = Math.max(0, this.duration - elapsed);

                if (this.onTick) this.onTick(this.remaining);

                if (this.remaining <= 0) {
                    this.stop();
                    if (this.onDone) this.onDone();
                }
            }

            _syncFromStorage() {
                const endTime = parseInt(localStorage.getItem('wt_timer_end') || '0');
                if (endTime && this.active) {
                    const now = Date.now();
                    this.remaining = Math.max(0, Math.ceil((endTime - now) / 1000));
                    if (this.onTick) this.onTick(this.remaining);

                    if (this.remaining <= 0) {
                        this.stop();
                        if (this.onDone) this.onDone();
                    }
                }
            }

            stop() {
                this.active = false;
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
                if (this._visibilityHandler) {
                    document.removeEventListener('visibilitychange', this._visibilityHandler);
                }
                localStorage.removeItem('wt_timer_active');
                localStorage.removeItem('wt_timer_end');
                localStorage.removeItem('wt_timer_duration');
            }

            getRemaining() {
                return this.remaining;
            }
        }

        class AudioManager {
            constructor() { 
                this.ctx = null; 
                this.initialized = false;
                this._bindEvents();
            }

            _bindEvents() {
                // Try to init on ANY user interaction - critical for Safari
                const events = ['touchstart', 'touchend', 'click', 'mousedown', 'keydown'];
                const handler = () => { this.init(); };
                events.forEach(evt => {
                    document.addEventListener(evt, handler, { once: true, passive: true });
                });
            }

            init() {
                if (this.initialized) return true;
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return false;
                    this.ctx = new AudioCtx();
                    this.initialized = true;
                    if (this.ctx.state === "suspended") {
                        this.ctx.resume();
                    }
                    // Also try to resume on visibility change
                    document.addEventListener('visibilitychange', () => {
                        if (!document.hidden && this.ctx && this.ctx.state === "suspended") {
                            this.ctx.resume();
                        }
                    });
                    return true;
                } catch (e) { return false; }
            }

            ensureRunning() {
                if (!this.ctx) this.init();
                if (this.ctx && this.ctx.state === "suspended") {
                    this.ctx.resume();
                }
                return this.ctx && this.ctx.state === "running";
            }

            // FIXED: Very short, quiet beeps that won't interrupt Spotify
            playBeep(freq, dur, vol) {
                // Always vibrate as fallback/primary on mobile
                this.vibrate(50);

                if (!this.ensureRunning()) return;

                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();

                    // Ultra-short, quiet beep so it doesn't interrupt Spotify
                    const actualDur = dur || 0.06;
                    const actualVol = (vol || 0.15) * 0.25;

                    osc.connect(gain); 
                    gain.connect(this.ctx.destination);
                    osc.frequency.value = freq || 1400;

                    // Use linear ramp for less audio glitch
                    gain.gain.setValueAtTime(0, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(actualVol, this.ctx.currentTime + 0.005);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + actualDur);

                    osc.start(this.ctx.currentTime); 
                    osc.stop(this.ctx.currentTime + actualDur + 0.02);
                } catch (e) {}
            }

            playDone() {
                // Strong vibration pattern as primary notification
                this.vibrate([100, 50, 100, 50, 200]);

                if (!this.ensureRunning()) return;

                try {
                    const now = this.ctx.currentTime;
                    [0, 0.12].forEach((t, i) => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.connect(gain); 
                        gain.connect(this.ctx.destination);
                        osc.frequency.value = i === 0 ? 1400 : 1800;

                        gain.gain.setValueAtTime(0, now + t);
                        gain.gain.linearRampToValueAtTime(0.08, now + t + 0.005);

                        React.createElement("div", { style: {background: "#1e293b", borderRadius: 12, padding: "12px 8px", textAlign: "center", border: "1px solid #334155"} },
                            React.createElement("div", { style: {color: "#475569", fontSize: 10, marginBottom: 4} }, "الحجم"),
                            React.createElement("div", { style: {color: c.accent, fontWeight: 800, fontSize: 13} }, formatVolume(vol))
                        ),
                        React.createElement("div", { style: {background: "#1e293b", borderRadius: 12, padding: "12px 8px", textAlign: "center", border: "1px solid #334155"} },
                            React.createElement("div", { style: {color: "#475569", fontSize: 10, marginBottom: 4} }, "المجموعات"),
                            React.createElement("div", { style: {color: doneSets === totalSets ? "#22c55e" : c.accent, fontWeight: 800, fontSize: 13} }, doneSets + "/" + totalSets)
                        ),
                        React.createElement("div", { style: {background: "#1e293b", borderRadius: 12, padding: "12px 8px", textAlign: "center", border: "1px solid #334155"} },
                            React.createElement("div", { style: {color: "#475569", fontSize: 10, marginBottom: 4} }, "متوسط RPE"),
                            React.createElement("div", { style: {color: avgRPE > 8 ? "#ef4444" : avgRPE > 6 ? "#f97316" : "#22c55e", fontWeight: 800, fontSize: 13} }, avgRPE > 0 ? avgRPE.toFixed(1) : "—")
                        )
                    ),
                    React.createElement("div", { style: {background: "#1e293b", borderRadius: 16, padding: 14, marginBottom: 14, border: "1px solid #334155"} },
                        React.createElement("div", { style: {color: "#475569", fontSize: 11, fontWeight: 700, marginBottom: 10} }, "ملخص الأداء الحالي"),
                        session.exercises.map((ex, i) => {
                            const pe = prev ? prev.exercises.find(e => e.name === ex.name) : null;
                            const cb = ex.type === "reps" ? ex.sets.reduce((b, s) => Math.max(b, parseFloat(s.weight) || 0), 0) : null;
                            const pb = pe && pe.type === "reps" ? pe.sets.reduce((b, s) => Math.max(b, parseFloat(s.weight) || 0), 0) : null;
                            const diff = cb && pb ? cb - pb : null;
                            const unit = ex.sets[0] ? ex.sets[0].unit : "kg";
                            const setRPEs = ex.sets.filter(s => s.rpe).map(s => s.rpe);
                            const avgExRPE = setRPEs.length ? (setRPEs.reduce((a, b) => a + b, 0) / setRPEs.length).toFixed(1) : null;
                            return React.createElement("div", { key: i, style: {display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: i < session.exercises.length - 1 ? "1px solid #0f172a" : "none", flexDirection: "row-reverse"} },
                                React.createElement("span", { style: {color: "#94a3b8", fontSize: 12} }, ex.name),
                                React.createElement("div", { style: {display: "flex", gap: 6, alignItems: "center", flexDirection: "row-reverse"} },
                                    ex.type === "reps" ? [
                                        React.createElement("span", { key: "r", style: {color: "#475569", fontSize: 11} }, ex.sets.map(s => s.reps || "?").join("/") + " تكرار"),
                                        React.createElement("span", { key: "w", style: {color: c.accent, fontWeight: 700, fontSize: 12} }, cb > 0 ? cb + unit : "—"),
                                        diff !== null && React.createElement("span", { key: "d", style: {color: diff > 0 ? "#22c55e" : diff < 0 ? "#ef4444" : "#64748b", fontSize: 11, fontWeight: 700} }, diff > 0 ? "↑" + diff : diff < 0 ? "↓" + Math.abs(diff) : "="),
                                        avgExRPE && React.createElement("span", { key: "rp", style: {color: "#a855f7", fontSize: 10} }, "RPE" + avgExRPE)
                                    ] : React.createElement("span", { style: {color: c.accent, fontSize: 11} }, "⏱ " + ex.sets.map(s => s.duration || "?").join(" / "))
                                )
                            );
                        })
                    ),
                    React.createElement("div", { style: {background: "linear-gradient(135deg,#1e293b,#0f1f35)", borderRadius: 18, padding: 16, marginBottom: 12, border: "1px solid " + c.accent + "33"} },
                        React.createElement("div", { style: {display: "flex", gap: 10, alignItems: "center", marginBottom: 10, flexDirection: "row-reverse"} },
                            React.createElement("span", { style: {fontSize: 22} }, "🤖"),
                            React.createElement("div", null,
                                React.createElement("div", { style: {color: "#f8fafc", fontWeight: 700, fontSize: 14} }, "ارتباط ذكي بـ Gemini"),
                                React.createElement("div", { style: {color: "#475569", fontSize: 11} }, "تم ترك خانات الساعة بالكامل فارغة لتقوم بإرفاق الإسكرين شوت يدوياً مع الـ Prompt التلقائي منسوخاً.")
                            )
                        ),
                        React.createElement("button", { onClick: copyAndGo, style: {width: "100%", background: copied ? "#22c55e" : "linear-gradient(135deg,#3b82f6," + c.accent + ")", border: "none", borderRadius: 12, padding: "14px", color: "#fff", cursor: "pointer", fontSize: 15, fontWeight: 700} },
                            copied ? "🚀 تم النسخ وجاري فتح Gemini..." : "📋 نسخ الـ Prompt والذهاب لـ Gemini"
                        )
                    ),
                    React.createElement("button", { onClick: onHome, style: {width: "100%", background: "transparent", border: "1px solid #1e293b", borderRadius: 12, padding: 12, color: "#47548b", cursor: "pointer"} }, "🏠 العودة للشاشة الرئيسية")
                )
            );
        }

        function HistoryScreen({onBack}) {
            const [history] = useState(getStorage);
            const [tab, setTab] = useState("log");
            const exStats = () => {
                const s = {};
                history.forEach(h => h.exercises.forEach(ex => {
                    if (!s[ex.name]) s[ex.name] = [];
                    ex.sets.forEach(set => { if (set.weight && set.reps) s[ex.name].push({date: h.date, weight: parseFloat(set.weight), reps: parseInt(set.reps), unit: set.unit, rpe: set.rpe}); });
                }));
                return s;
            };
            const stats = exStats();
            const keys = Object.keys(stats);
            return React.createElement("div", { className: "min-h-screen text-right pb-40 safe-top safe-bottom", style: {background: "#0a0f1a"} },
                React.createElement("div", { style: {background: "#1e293b", padding: "16px 16px 0", borderBottom: "1px solid #334155"} },
                    React.createElement("div", { style: {display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14} },
                        React.createElement("div", { style: {color: "#f8fafc", fontWeight: 800, fontSize: 18} }, "📊 السجل والتحليل التراكمي"),
                        React.createElement("button", { onClick: onBack, style: {background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 8, padding: "7px 11px", color: "#e2e8f0", cursor: "pointer", fontSize: 15} }, "→")
                    ),
                    React.createElement("div", { style: {display: "flex", background: "#0a0f1a", borderRadius: 10, padding: 3, marginBottom: 14, flexDirection: "row-reverse"} },
                        [["log","📋 السجل"],["analysis","📈 تحليل"]].map(([t,l]) =>
                            React.createElement("button", { key: t, onClick: () => setTab(t), style: {flex: 1, background: tab === t ? "#3b82f6" : "transparent", border: "none", borderRadius: 8, padding: "7px 0", color: tab === t ? "#fff" : "#64748b", fontSize: 12, fontWeight: 600} }, l)
                        )
                    )
                ),
                React.createElement("div", { style: {padding: 16} },
                    tab === "log" && (history.length === 0
                        ? React.createElement("div", { style: {textAlign: "center", padding: 60, color: "#475569"} }, React.createElement("div", { style: {fontSize: 48} }, "🏋️"), React.createElement("p", null, "لا يوجد تدريبات مسجلة بعد"))
                        : [...history].reverse().map((s, i) => {
                            const c = C[s.workout] || {accent: "#3b82f6", emoji: "💪"};
                            const vol = calcVolume(s.exercises);
                            return React.createElement("div", { key: i, style: {background: "#1e293b", borderRadius: 14, padding: 14, marginBottom: 10, border: "1px solid #334155"} },
                                React.createElement("div", { style: {display: "flex", justifyContent: "space-between", flexDirection: "row-reverse"} },
                                    React.createElement("div", null,
                                        React.createElement("div", { style: {color: "#f8fafc", fontWeight: 700, fontSize: 14} }, c.emoji + " " + s.workout),
                                        React.createElement("div", { style: {color: "#64748b", fontSize: 12, marginTop: 2} }, s.date + " • " + (s.durationMins || "—") + " دقيقة")
                                    ),
                                    React.createElement("div", { style: {textAlign: "left"} },
                                        vol > 0 && React.createElement("div", { style: {color: c.accent, fontWeight: 700, fontSize: 14} }, formatVolume(vol)),
                                        React.createElement("div", { style: {color: "#64748b", fontSize: 11} }, s.exercises.reduce((a, ex) => a + ex.sets.filter(x => x.done).length, 0) + "/" + s.exercises.reduce((a, ex) => a + ex.sets.length, 0) + " جولة")
                                    )
                                )
                            );
                        })
                    ),
                    tab === "analysis" && (keys.length === 0
                        ? React.createElement("div", { style: {textAlign: "center", padding: 60, color: "#475569"} }, React.createElement("p", null, "سجل بعض التدريبات أولاً لرؤية التحليل المتقدم"))
                        : keys.map(name => {
                            const e = stats[name];
                            if (!e.length) return null;
                            const mW = Math.max(...e.map(x => x.weight));
                            const aR = Math.round(e.reduce((a, x) => a + x.reps, 0) / e.length);
                            const trend = e.length > 1 ? (e[e.length - 1].weight > e[0].weight ? "📈 تحسن" : e[e.length - 1].weight < e[0].weight ? "📉 تراجع" : "➡️ ثابت") : "—";
                            const avgRPE = e.filter(x => x.rpe).length ? (e.filter(x => x.rpe).reduce((a, x) => a + x.rpe, 0) / e.filter(x => x.rpe).length).toFixed(1) : "—";
                            return React.createElement("div", { key: name, style: {background: "#1e293b", borderRadius: 14, padding: 14, marginBottom: 10, border: "1px solid #334155"} },
                                React.createElement("div", { style: {color: "#f8fafc", fontWeight: 700, fontSize: 13, marginBottom: 10} }, name),
                                React.createElement("div", { style: {display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8} },
                                    [["اتجاه",trend],["متوسط التكرار",aR],["أعلى وزن",mW+e[0].unit],["متوسط RPE",avgRPE]].map(([l,v]) =>
                                        React.createElement("div", { key: l, style: {background: "#0a0f1a", borderRadius: 8, padding: "8px 4px", textAlign: "center"} },
                                            React.createElement("div", { style: {color: "#475569", fontSize: 9, marginBottom: 3} }, l),
                                            React.createElement("div", { style: {color: "#f8fafc", fontWeight: 700, fontSize: 11} }, v)
                                        )
                                    )
                                )
                            );
                        })
                    )
                )
            );
        }

        function App() {
            const [screen, setScreen] = useState("select");
            const [activeWorkout, setActiveWorkout] = useState(null);
            const [reportData, setReportData] = useState(null);
            if (screen === "workout") return React.createElement(WorkoutScreen, { workoutName: activeWorkout, onBack: () => setScreen("select"), onFinish: (s, h) => { setReportData({session: s, history: h}); setScreen("report"); } });
            if (screen === "report") return React.createElement(ReportScreen, { session: reportData.session, history: reportData.history, onHome: () => setScreen("select") });
            if (screen === "history") return React.createElement(HistoryScreen, { onBack: () => setScreen("select") });
            if (screen === "__profile__") return React.createElement(ProfileScreen, { onBack: () => setScreen("select") });
            if (screen === "__sync__") return React.createElement(GeminiSyncScreen, { onBack: () => setScreen("select") });
            if (screen === "__export__") return React.createElement(ExportScreen, { onBack: () => setScreen("select") });
            if (screen === "__ai__") return React.createElement(AICoachScreen, { onBack: () => setScreen("select") });
            return React.createElement(SelectScreen, { onSelect: name => {
                if (name === "__history__") return setScreen("history");
                if (name === "__profile__") return setScreen("__profile__");
                if (name === "__sync__") return setScreen("__sync__");
                if (name === "__export__") return setScreen("__export__");
                if (name === "__ai__") return setScreen("__ai__");
                setActiveWorkout(name); setScreen("workout");
            }});
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(App));
    </script>
</body>
</html>
